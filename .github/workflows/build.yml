name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Build on Linux
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make libsqlite3-dev
      
      - name: Build
        run: make release
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kalishell-linux-x64
          path: build/kalishell

  # Build on Windows (MinGW)
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies (MSYS2)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-sqlite3
      
      - name: Build
        shell: msys2 {0}
        run: |
          mingw32-make release
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kalishell-windows-x64
          path: build/kalishell.exe

  # Build on macOS
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: make release
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kalishell-macos-arm64
          path: build/kalishell

  # Build Docker image
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t kalishell:latest .
      
      - name: Save Docker image
        run: docker save kalishell:latest | gzip > kalishell-docker.tar.gz
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kalishell-docker
          path: kalishell-docker.tar.gz

  # Create GitHub Release
  release:
    needs: [build-linux, build-windows, build-macos, build-docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            kalishell-linux-x64/kalishell
            kalishell-windows-x64/kalishell.exe
            kalishell-macos-arm64/kalishell
            kalishell-docker/kalishell-docker.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
