name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y gcc make libsqlite3-dev
      - name: Build
        run: make release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: gupt-linux-x64
          path: build/gupt

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-make mingw-w64-x86_64-sqlite3
      - name: Build
        shell: msys2 {0}
        run: mingw32-make release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: gupt-windows-x64
          path: build/gupt.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: gupt-macos-arm64
          path: build/gupt

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            gupt-linux-x64/gupt
            gupt-windows-x64/gupt.exe
            gupt-macos-arm64/gupt
